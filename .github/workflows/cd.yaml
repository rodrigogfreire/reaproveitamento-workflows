name: Deploy Fake
on:
  workflow_call:
    inputs:
      ambiente:
        type: string
        default: "desenvolvimento"
        required: true
        description: "Ambiente de Deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no ambiente
        run: echo "Executando o deploy no ambiente de desenvolvimento ${{ inputs.ambiente }}"